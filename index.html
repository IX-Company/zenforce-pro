<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚀 ZenForce Pro - Pomodoro + Kanban + Temas Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #05050f;
            --bg-secondary: rgba(8, 8, 20, 0.92);
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --bg-task: rgba(255, 255, 255, 0.04);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.25);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --shadow-color: rgba(0, 0, 0, 0.8);
            --radius: 24px;
            --radius-sm: 12px;
            --transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --accent-focus: #f97316;
            --accent-break: #22c55e;
            --accent-longbreak: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --theme-color: #f97316;
        }

        /* ===== THEMES PREMIUM ===== */
        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: rgba(255, 255, 255, 0.92);
            --bg-card: rgba(0, 0, 0, 0.03);
            --bg-card-hover: rgba(0, 0, 0, 0.06);
            --bg-task: rgba(0, 0, 0, 0.02);
            --text-primary: #0a0a0f;
            --text-secondary: rgba(0, 0, 0, 0.7);
            --text-tertiary: rgba(0, 0, 0, 0.25);
            --border-color: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(0, 0, 0, 0.12);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --accent-gradient: linear-gradient(135deg, #f97316, #ea580c);
            --theme-color: #f97316;
        }

        [data-theme="neon"] {
            --bg-primary: #0a0015;
            --bg-secondary: rgba(10, 0, 21, 0.92);
            --text-primary: #00ffc8;
            --text-secondary: rgba(0, 255, 200, 0.6);
            --text-tertiary: rgba(0, 255, 200, 0.25);
            --border-color: rgba(0, 255, 200, 0.1);
            --border-hover: rgba(0, 255, 200, 0.2);
            --bg-card: rgba(0, 255, 200, 0.03);
            --bg-card-hover: rgba(0, 255, 200, 0.07);
            --bg-task: rgba(0, 255, 200, 0.04);
            --accent-gradient: linear-gradient(135deg, #00ffc8, #00ccff);
            --accent-focus: #00ffc8;
            --theme-color: #00ffc8;
        }

        [data-theme="sunset"] {
            --bg-primary: #1a0a1a;
            --bg-secondary: rgba(26, 10, 26, 0.92);
            --text-primary: #ff6b9d;
            --text-secondary: rgba(255, 107, 157, 0.6);
            --text-tertiary: rgba(255, 107, 157, 0.25);
            --border-color: rgba(255, 107, 157, 0.1);
            --border-hover: rgba(255, 107, 157, 0.2);
            --bg-card: rgba(255, 107, 157, 0.03);
            --bg-card-hover: rgba(255, 107, 157, 0.07);
            --bg-task: rgba(255, 107, 157, 0.04);
            --accent-gradient: linear-gradient(135deg, #ff6b9d, #ff9a56);
            --accent-focus: #ff6b9d;
            --theme-color: #ff6b9d;
        }

        [data-theme="forest"] {
            --bg-primary: #05100a;
            --bg-secondary: rgba(5, 16, 10, 0.92);
            --text-primary: #4ade80;
            --text-secondary: rgba(74, 222, 128, 0.6);
            --text-tertiary: rgba(74, 222, 128, 0.25);
            --border-color: rgba(74, 222, 128, 0.1);
            --border-hover: rgba(74, 222, 128, 0.2);
            --bg-card: rgba(74, 222, 128, 0.03);
            --bg-card-hover: rgba(74, 222, 128, 0.07);
            --bg-task: rgba(74, 222, 128, 0.04);
            --accent-gradient: linear-gradient(135deg, #4ade80, #22d3ee);
            --accent-focus: #4ade80;
            --theme-color: #4ade80;
        }

        [data-theme="galaxy"] {
            --bg-primary: #050510;
            --bg-secondary: rgba(5, 5, 16, 0.92);
            --text-primary: #a78bfa;
            --text-secondary: rgba(167, 139, 250, 0.6);
            --text-tertiary: rgba(167, 139, 250, 0.25);
            --border-color: rgba(167, 139, 250, 0.1);
            --border-hover: rgba(167, 139, 250, 0.2);
            --bg-card: rgba(167, 139, 250, 0.03);
            --bg-card-hover: rgba(167, 139, 250, 0.07);
            --bg-task: rgba(167, 139, 250, 0.04);
            --accent-gradient: linear-gradient(135deg, #a78bfa, #ec4899);
            --accent-focus: #a78bfa;
            --theme-color: #a78bfa;
        }

        /* ===== BACKGROUND ===== */
        #background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            transition: all 1.5s ease;
        }
        #background-layer.bg-gradient {
            background: linear-gradient(135deg, #05050f, #0f0c29, #302b63);
        }
        [data-theme="light"] #background-layer.bg-gradient {
            background: linear-gradient(135deg, #f0f2f5, #e2e8f0, #d1d5db);
        }
        [data-theme="neon"] #background-layer.bg-gradient {
            background: linear-gradient(135deg, #0a0015, #1a0030, #0a0015);
        }
        [data-theme="sunset"] #background-layer.bg-gradient {
            background: linear-gradient(135deg, #1a0a1a, #2d1b2e, #1a0a1a);
        }
        [data-theme="forest"] #background-layer.bg-gradient {
            background: linear-gradient(135deg, #05100a, #0a1a10, #05100a);
        }
        [data-theme="galaxy"] #background-layer.bg-gradient {
            background: linear-gradient(135deg, #050510, #0f0a2a, #050510);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
            pointer-events: none;
        }
        [data-theme="light"] .bg-overlay {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== PARTICLES ===== */
        #quantum-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== BASE ===== */
        body {
            font-family: var(--font);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: var(--transition);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .app-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
        }

        .app-container {
            background: var(--bg-secondary);
            backdrop-filter: blur(60px);
            border-radius: var(--radius);
            padding: 2rem 2rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 100px var(--shadow-color);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, var(--theme-color), transparent 60%);
            opacity: 0.03;
            pointer-events: none;
        }

        /* ===== LEFT COLUMN ===== */
        .pomodoro-section {
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo .icon {
            font-size: 1.8rem;
            -webkit-text-fill-color: initial;
            animation: spin 10s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        .logo .badge {
            font-size: 0.4rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-text-fill-color: #fff;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .header-actions {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .header-actions button:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
            border-color: var(--border-hover);
        }
        .header-actions button .tooltip {
            position: absolute;
            bottom: -2rem;
            font-size: 0.5rem;
            opacity: 0;
            transition: var(--transition);
            background: var(--bg-secondary);
            padding: 0.15rem 0.6rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            white-space: nowrap;
            pointer-events: none;
        }
        .header-actions button:hover .tooltip {
            opacity: 0.9;
            bottom: -2.4rem;
        }

        /* Timer */
        .timer-section {
            text-align: center;
            margin: 0.3rem 0 1rem;
        }
        .timer-circle-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .timer-circle-container:hover {
            transform: scale(1.02);
        }
        .timer-circle-container svg {
            transform: rotate(-90deg);
            width: 240px;
            height: 240px;
        }
        .timer-circle-container .bg-circle {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 6;
        }
        .timer-circle-container .progress-circle {
            fill: none;
            stroke: var(--accent-focus);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 723.82;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.6s ease, stroke 0.6s ease;
        }
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .timer-text .time {
            font-size: 3.8rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: 3px;
            line-height: 1;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .timer-text .phase-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.3;
            margin-top: 0.3rem;
        }
        .timer-text .session-counter {
            font-size: 0.6rem;
            opacity: 0.2;
            margin-top: 0.2rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .controls button {
            font-family: var(--font);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .controls button:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
            border-color: var(--border-hover);
        }
        .controls button.primary {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 8px 30px rgba(249, 115, 22, 0.3);
        }
        .controls button.primary:hover {
            box-shadow: 0 12px 50px rgba(249, 115, 22, 0.4);
            transform: translateY(-2px);
            color: #fff;
        }
        .controls button .key-hint {
            font-size: 0.45rem;
            opacity: 0.3;
        }

        /* Config */
        .config-panel {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            margin: 0.8rem 0;
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }
        .config-item {
            text-align: center;
        }
        .config-item label {
            display: block;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.3;
            font-weight: 600;
        }
        .config-item input {
            width: 100%;
            padding: 0.3rem 0.2rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            transition: var(--transition);
            font-family: var(--font);
        }
        .config-item input:focus {
            outline: none;
            border-color: var(--accent-focus);
        }
        .config-item .unit {
            font-size: 0.45rem;
            opacity: 0.2;
            display: block;
        }

        /* Themes Premium */
        .themes-panel {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border-color);
            margin: 0.5rem 0;
        }
        .themes-grid {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .theme-btn {
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .theme-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        .theme-btn.active {
            border-color: var(--theme-color);
            background: var(--accent-gradient);
            color: #fff;
        }
        .theme-btn .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.3rem;
            padding: 0.6rem 0;
            border-top: 1px solid var(--border-color);
            margin-top: 0.6rem;
        }
        .stat-item {
            text-align: center;
            padding: 0.2rem;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }
        .stat-item:hover {
            background: var(--bg-card);
        }
        .stat-item .value {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-item .label {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.25;
            display: block;
            font-weight: 600;
        }

        .session-progress {
            height: 3px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            margin: 0.3rem 0;
        }
        .session-progress .bar {
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.6s ease;
            width: 0%;
        }

        /* ===== RIGHT COLUMN (KANBAN) ===== */
        .kanban-section {
            position: relative;
            z-index: 1;
            border-left: 1px solid var(--border-color);
            padding-left: 1.5rem;
        }

        .kanban-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .kanban-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
            opacity: 0.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .kanban-actions {
            display: flex;
            gap: 0.3rem;
        }
        .kanban-actions button {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.7rem;
            transition: var(--transition);
            font-family: var(--font);
        }
        .kanban-actions button:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .kanban-columns {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 480px;
            overflow-y: auto;
            padding-right: 0.3rem;
        }
        .kanban-columns::-webkit-scrollbar {
            width: 3px;
        }
        .kanban-columns::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .kanban-column {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 0.6rem;
            border: 1px solid var(--border-color);
        }
        .kanban-column .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.4;
        }
        .kanban-column .col-header .count {
            background: var(--bg-card);
            padding: 0.05rem 0.4rem;
            border-radius: 20px;
            font-size: 0.55rem;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            min-height: 30px;
        }

        .task-item {
            background: var(--bg-task);
            padding: 0.4rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            cursor: grab;
            font-size: 0.75rem;
        }
        .task-item:hover {
            border-color: var(--border-hover);
            transform: translateX(3px);
        }
        .task-item .task-text {
            flex: 1;
            margin-right: 0.5rem;
            word-break: break-word;
        }
        .task-item .task-actions {
            display: flex;
            gap: 0.2rem;
        }
        .task-item .task-actions button {
            background: transparent;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 0.6rem;
            padding: 0.1rem 0.2rem;
            transition: var(--transition);
        }
        .task-item .task-actions button:hover {
            color: var(--text-primary);
        }

        .task-input-row {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.4rem;
        }
        .task-input-row input {
            flex: 1;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.7rem;
            font-family: var(--font);
            transition: var(--transition);
        }
        .task-input-row input:focus {
            outline: none;
            border-color: var(--accent-focus);
        }
        .task-input-row input::placeholder {
            color: var(--text-tertiary);
        }
        .task-input-row button {
            padding: 0.2rem 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--accent-gradient);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: var(--transition);
        }
        .task-input-row button:hover {
            transform: scale(1.05);
        }

        /* ===== FOOTER ===== */
        .footer {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.55rem;
            opacity: 0.3;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .footer a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .footer a:hover {
            opacity: 1;
            background: var(--bg-card);
        }
        .footer .right {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;

    <script>
        // ================================================================

        // ---- TRADUCCIONES ----
        const LANG = {
            es: {

                breakPhase: 'BREAK',
                longPhase: 'LONG BREAK',
                sessions: '🍅 Sessions',
                minutes: '⏱ Minutes',
                today: '📅 Today',
                streak: 'Streak',
                kanban: '📋 Tasks',

                newTask: 'New task...',

                clearDone: 'Clear done',
                sessionCounter: 'Session {n} · {c}/4',
            }
        };

        let currentLang = 'es';

        // ---- ESTADO GLOBAL ----
        const state = {
            focus: 25,
            break: 5,
            longBreak: 15,
            current: 25 * 60,
            remaining: 25 * 60,
            phase: 'focus',
            isRunning: false,
            isPaused: false,

            sessions: 0,

        // ---- DOM ----
        const $ = id => document.getElementById(id);

        const pauseLabel = $('pauseLabel');
        const resetLabel = $('resetLabel');
        const skipLabel = $('skipLabel');

        const todaySessions = $('todaySessions');
        const streakDisplay = $('streakDisplay');
        const sessionProgressBar = $('sessionProgressBar');

        const soundToggle = $('soundToggle');
        const deepFocusToggle = $('deepFocusToggle');
        const langToggle = $('langToggle');
        const appContainer = $('appContainer');
        const toastContainer = $('toastContainer');
        const currentTimeEl = $('currentTime');
        const bgLayer = $('background-layer');
        const todoInput = $('todoInput');
        const addTodoBtn = $('addTodoBtn');
        const todoList = $('todoList');
        const progressList = $('progressList');
        const doneList = $('doneList');
        const todoCount = $('todoCount');
        const progressCount = $('progressCount');
        const doneCount = $('doneCount');
        const clearTasksBtn = $('clearTasksBtn');
        const exportTasksBtn = $('exportTasksBtn');
        const importTasksBtn = $('importTasksBtn');

        const CIRCUMFERENCE = 2 * Math.PI * 110;

        // ---- QUANTUM PARTICLES ----
        class QuantumParticles {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.count = 80;
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.init();
                this.animate();
            }
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }
            init() {
                this.particles = [];
                for (let i = 0; i < this.count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 2 + 0.5,
                        speedX: (Math.random() - 0.5) * 0.3,
                        speedY: (Math.random() - 0.5) * 0.3,
                        opacity: Math.random() * 0.3 + 0.1,
                        hue: Math.random() * 60 + 20,
                    });
                }
            }
            animate() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < 0) p.x = this.canvas.width;
                    if (p.x > this.canvas.width) p.x = 0;
                    if (p.y < 0) p.y = this.canvas.height;
                    if (p.y > this.canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
                    ctx.fill();
                });
                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i + 1; j < this.particles.length; j++) {
                        const dx = this.particles[i].x - this.particles[j].x;
                        const dy = this.particles[i].y - this.particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(this.particles[i].x, this.particles[i].y);
                            ctx.lineTo(this.particles[j].x, this.particles[j].y);
                            ctx.strokeStyle = `rgba(249,115,22,${0.04 * (1 - dist / 150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        const quantumCanvas = document.getElementById('quantum-canvas');
        if (quantumCanvas) new QuantumParticles(quantumCanvas);

        // ---- UTILIDADES ----
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function showToast(message, duration = 2500, emoji = '') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = emoji ? `<span style="margin-right:0.4rem;">${emoji}</span> ${message}` : message;
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, duration);
        }

        function t(key) {
            return LANG[currentLang][key] || key;
        }

        // ---- SONIDOS ----
        function playSound(type = 'complete') {
            if (!state.soundEnabled) return;
            try {
                const ctx = new(window.AudioContext || window.webkitAudioContext)();
                if (type === 'complete') {
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.value = 0.06;
                        osc.start(ctx.currentTime + i * 0.1);
                        osc.stop(ctx.currentTime + i * 0.1 + 0.12);
                    });
                } else if (type === 'tick') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = 1000;
                    gain.gain.value = 0.03;
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.03);
                } else if (type === 'start') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(880, ctx.currentTime + 0.1);
                    gain.gain.value = 0.06;
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.15);
                }
            } catch (e) { /* fallback */ }
        }

        // ---- NOTIFICACIONES ----
        function sendNotification(title, body) {
            if ('Notification' in window && Notification.permission === 'granted') {
                new Notification(`🚀 ${title}`, {
                    body: body,
                    icon: '🚀',
                    silent: true,
                });
            }
        }

        // ---- TEMAS ----
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            state.theme = theme;
            localStorage.setItem('zenforce_theme', theme);
            
            // Actualizar botones
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.theme-btn[data-theme="${theme}"]`)?.classList.add('active');
            
            // Actualizar icono del toggle
            themeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
            
            // Actualizar fondo
            bgLayer.className = 'bg-gradient';
            
            showToast(`🎨 Tema: ${theme.charAt(0).toUpperCase() + theme.slice(1)}`, 1500);
        }

        // ---- KANBAN ----
        function renderTasks() {
            const renderList = (list, container, column) => {
                container.innerHTML = '';
                state.tasks[column].forEach((task, index) => {
                    const div = document.createElement('div');
                    div.className = 'task-item';
                    div.draggable = true;
                    div.dataset.index = index;
                    div.dataset.column = column;
                    div.innerHTML = `
                        <span class="task-text">${task}</span>
                        <div class="task-actions">
                            ${column === 'todo' ? `<button onclick="moveTask('${column}', ${index}, 'progress')">→</button>` : ''}
                            ${column === 'progress' ? `<button onclick="moveTask('${column}', ${index}, 'done')">✓</button>` : ''}
                            ${column === 'done' ? `<button onclick="moveTask('${column}', ${index}, 'todo')">↩</button>` : ''}
                            <button onclick="deleteTask('${column}', ${index})">✕</button>
                        </div>
                    `;
                    div.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({ column, index }));
                        div.classList.add('dragging');
                    });
                    div.addEventListener('dragend', () => div.classList.remove('dragging'));
                    container.appendChild(div);
                });
                document.getElementById(`${column}Count`).textContent = state.tasks[column].length;
            };

            renderList(state.tasks.todo, todoList, 'todo');
            renderList(state.tasks.progress, progressList, 'progress');
            renderList(state.tasks.done, doneList, 'done');

            todoCount.textContent = state.tasks.todo.length;
            progressCount.textContent = state.tasks.progress.length;
            doneCount.textContent = state.tasks.done.length;

            saveTasks();
        }

        function addTask(column = 'todo') {
            const input = column === 'todo' ? todoInput : document.getElementById(`${column}Input`);
            const text = input ? input.value.trim() : '';
            if (!text) return;
            state.tasks[column].push(text);
            if (input) input.value = '';
            renderTasks();
            showToast('✅ Tarea añadida', 1500, '📝');
            saveTasks();
        }

        function deleteTask(column, index) {
            state.tasks[column].splice(index, 1);
            renderTasks();
            saveTasks();
        }

        function moveTask(fromColumn, fromIndex, toColumn) {
            const task = state.tasks[fromColumn].splice(fromIndex, 1)[0];
            if (task) {
                state.tasks[toColumn].push(task);
                renderTasks();
                saveTasks();
                showToast('📦 Tarea movida', 1000, '🔄');
            }
        }

        document.addEventListener('dragover', (e) => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const target = e.target.closest('.kanban-column');
            if (!target) return;
            const toColumn = target.dataset.column;
            const data = e.dataTransfer.getData('text/plain');
            if (!data) return;
            try {
                const { column, index } = JSON.parse(data);
                if (column === toColumn) return;
                moveTask(column, index, toColumn);
            } catch (err) { /* ignorar */ }
        });

        function clearDoneTasks() {
            if (state.tasks.done.length === 0) return;
            if (confirm(t('clearDone') + '?')) {
                state.tasks.done = [];
                renderTasks();
                saveTasks();
                showToast('🧹 Tareas completadas limpiadas', 1500);
            }
        }

        function exportTasks() {
            const data = { tasks: state.tasks, version: '1.0' };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Tareas exportadas', 1500);
        }

        function importTasks() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.tasks) {
                            state.tasks = data.tasks;
                            renderTasks();
                            saveTasks();
                            showToast('✅ Tareas importadas', 1500);
                        }
                    } catch (err) {
                        showToast('❌ Archivo inválido', 1500);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // ---- LOCALSTORAGE ----
        function saveTasks() {
            try {
                localStorage.setItem('zenforce_tasks', JSON.stringify(state.tasks));
            } catch (e) { /* ignorar */ }
        }

        function loadTasks() {
            try {
                const saved = localStorage.getItem('zenforce_tasks');
                if (saved) {
                    const data = JSON.parse(saved);
                    state.tasks = data;
                }
            } catch (e) { /* ignorar */ }
        }

        function loadState() {
            try {
                const saved = localStorage.getItem('zenforce_state');
                if (saved) {
                    const data = JSON.parse(saved);
                    Object.assign(state, data);
                    focusInput.value = state.focus || 25;
                    breakInput.value = state.break || 5;
                    longBreakInput.value = state.longBreak || 15;
                    checkStreak();
                }
            } catch (e) { /* ignorar */ }
        }

        function saveState() {
            try {
                localStorage.setItem('zenforce_state', JSON.stringify({
                    sessions: state.sessions,
                    totalMinutes: state.totalMinutes,
                    todaySessions: state.todaySessions,
                    streak: state.streak,
                    lastDate: state.lastDate,
                    focus: state.focus,
                    break: state.break,
                    longBreak: state.longBreak,
                    totalFocusTime: state.totalFocusTime,
                    totalBreakTime: state.totalBreakTime,
                    theme: state.theme,
                    lang: state.lang,
                }));
            } catch (e) { /* ignorar */ }
        }

        function checkStreak() {
            const today = new Date().toDateString();
            if (state.lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (state.lastDate !== yesterday.toDateString()) {
                    state.streak = 0;
                }
                state.todaySessions = 0;
                state.lastDate = today;
                saveState();
            }
        }

        function updateStreak() {
            const today = new Date().toDateString();
            if (state.lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (state.lastDate === yesterday.toDateString()) {
                    state.streak += 1;
                } else {
                    state.streak = 1;
                }
                state.todaySessions = 0;
                state.lastDate = today;
            }
            state.todaySessions += 1;
            saveState();
        }

        // ---- ACTUALIZAR UI ----
        function updateUI() {
            timerDisplay.textContent = formatTime(state.remaining);

            const phaseMap = { focus: t('focusPhase'), break: t('breakPhase'), longBreak: t('longPhase') };
            phaseDisplay.textContent = phaseMap[state.phase] || 'ENFOQUE';

            const progress = state.current > 0 ? state.remaining / state.current : 0;
            const offset = CIRCUMFERENCE * (1 - progress);
            progressRing.style.strokeDashoffset = offset;

            const colors = { focus: '#f97316', break: '#22c55e', longBreak: '#3b82f6' };
            progressRing.style.stroke = colors[state.phase] || '#f97316';

            appContainer.className = 'app-container';
            if (state.phase === 'focus') appContainer.classList.add('focus-mode');
            else if (state.phase === 'break') appContainer.classList.add('break-mode');
            else if (state.phase === 'longBreak') appContainer.classList.add('longbreak-mode');

            const cycle = (state.sessions % 4) + 1;
            sessionCounter.textContent = t('sessionCounter').replace('{n}', state.sessions + 1).replace('{c}', cycle);

            const pct = ((state.sessions % 4) / 4) * 100;
            sessionProgressBar.style.width = `${pct}%`;

            sessionsCount.textContent = state.sessions;
            totalTimeDisplay.textContent = state.totalMinutes;
            todaySessions.textContent = state.todaySessions;
            streakDisplay.textContent = `🔥 ${state.streak}`;

            if (state.isRunning && !state.isPaused) {
                startLabel.textContent = t('start');
                startBtn.style.opacity = '0.6';
            } else if (state.isPaused) {
                startLabel.textContent = t('start');
                startBtn.style.opacity = '1';
            } else {
                startLabel.textContent = t('start');
                startBtn.style.opacity = '1';
            }
        }

        // ---- IDIOMA ----
        function setLanguage(lang) {
            currentLang = lang;
            state.lang = lang;
            localStorage.setItem('zenforce_lang', lang);
            langToggle.textContent = lang === 'es' ? '🇪🇸' : '🇬🇧';
            updateLabels();
            renderTasks();
            updateUI();
            showToast(lang === 'es' ? '🇪🇸 Español' : '🇬🇧 English', 1000);
        }

        function updateLabels() {
            document.getElementById('focusLabel').textContent = t('focus');
            document.getElementById('breakLabel').textContent = t('break');
            document.getElementById('longBreakLabel').textContent = t('longBreak');
            startLabel.textContent = t('start');
            pauseLabel.textContent = t('pause');
            resetLabel.textContent = t('reset');
            skipLabel.textContent = t('skip');
            document.getElementById('sessionsLabel').textContent = t('sessions');
            document.getElementById('totalLabel').textContent = t('minutes');
            document.getElementById('todayLabel').textContent = t('today');
            document.getElementById('streakLabel').textContent = t('streak');
            document.getElementById('kanbanTitle').textContent = t('kanban');
            document.getElementById('todoLabel').textContent = t('todo');
            document.getElementById('progressLabel').textContent = t('progress');
            document.getElementById('doneLabel').textContent = t('done');
            document.querySelector('#todoInput').placeholder = t('newTask');
            document.querySelector('#addTodoBtn').textContent = t('addTask');
        }

        // ---- TIMER ----
        function startTimer() {
            if (state.isRunning && !state.isPaused) return;

            if (state.isPaused) {
                state.isPaused = false;
                state.isRunning = true;
                runInterval();
                updateUI();
                showToast('▶ ' + t('start'), 1500);
                return;
            }

            loadFromInputs();
            state.current = state.focus * 60;
            state.remaining = state.current;
            state.phase = 'focus';
            state.isRunning = true;
            state.isPaused = false;
            updateUI();
            runInterval();
            playSound('start');
            showToast('🎯 ' + t('focusPhase'), 2000);
            sendNotification(t('focusPhase'), t('focus'));
            timerCircle.classList.add('pulse');
            setTimeout(() => timerCircle.classList.remove('pulse'), 3000);
        }

        function runInterval() {
            if (state.interval) clearInterval(state.interval);
            state.interval = setInterval(() => {
                if (state.isPaused) return;
                state.remaining--;
                updateUI();

                if (state.remaining <= 5 && state.remaining > 0) {
                    playSound('tick');
                }

                if (state.remaining <= 0) {
                    clearInterval(state.interval);
                    state.interval = null;
                    handlePhaseComplete();
                }
            }, 1000);
        }

        function handlePhaseComplete() {
            playSound('complete');
            sendNotification('✅ ' + t('focusPhase'), 'Completado');

            if (state.phase === 'focus') {
                state.sessions++;
                state.totalMinutes += state.focus;
                state.totalFocusTime += state.focus;
                updateStreak();
                state.sessionInCycle = (state.sessionInCycle + 1) % 4;

                if (state.sessionInCycle === 0) {
                    state.phase = 'longBreak';
                    state.current = state.longBreak * 60;
                    showToast('🌟 ' + t('longPhase'), 2500);
                } else {
                    state.phase = 'break';
                    state.current = state.break * 60;
                    showToast('☕ ' + t('breakPhase'), 2000);
                }
            } else {
                if (state.phase === 'break') state.totalBreakTime += state.break;
                if (state.phase === 'longBreak') state.totalBreakTime += state.longBreak;
                state.phase = 'focus';
                state.current = state.focus * 60;
                showToast('🎯 ' + t('focusPhase'), 2000);
            }

            state.remaining = state.current;
            state.isRunning = true;
            state.isPaused = false;
            updateUI();
            runInterval();
            saveState();
            timerCircle.classList.add('pulse');
            setTimeout(() => timerCircle.classList.remove('pulse'), 2000);
        }

        function pauseTimer() {
            if (!state.isRunning) return;
            if (state.isPaused) {
                state.isPaused = false;
                runInterval();
                updateUI();
                showToast('▶ ' + t('start'), 1500);
            } else {
                state.isPaused = true;
                if (state.interval) {
                    clearInterval(state.interval);
                    state.interval = null;
                }
                updateUI();
                showToast('⏸ ' + t('pause'), 1500);
            }
        }

        function resetTimer() {
            if (state.interval) {
                clearInterval(state.interval);
                state.interval = null;
            }
            state.isRunning = false;
            state.isPaused = false;
            state.phase = 'focus';
            loadFromInputs();
            state.current = state.focus * 60;
            state.remaining = state.current;
            updateUI();
            showToast('↻ ' + t('reset'), 1500);
            timerCircle.classList.remove('pulse');
        }

        function skipPhase() {
            if (state.interval) {
                clearInterval(state.interval);
                state.interval = null;
            }
            state.remaining = 0;
            handlePhaseComplete();
            showToast('⏭ ' + t('skip'), 1500);
        }

        function loadFromInputs() {
            const f = parseInt(focusInput.value) || 25;
            const b = parseInt(breakInput.value) || 5;
            const lb = parseInt(longBreakInput.value) || 15;
            state.focus = Math.max(1, Math.min(90, f));
            state.break = Math.max(1, Math.min(30, b));
            state.longBreak = Math.max(1, Math.min(45, lb));
            if (!state.isRunning) {
                state.current = state.focus * 60;
                state.remaining = state.current;
                state.phase = 'focus';
                updateUI();
            }
        }

        // ---- DEEP FOCUS ----
        function toggleDeepFocus() {
            state.deepFocus = !state.deepFocus;
            document.body.classList.toggle('deep-focus');
            deepFocusToggle.style.opacity = state.deepFocus ? '1' : '0.5';
            showToast(state.deepFocus ? '🎯 Deep Focus ON' : '🎯 Deep Focus OFF', 1500);
        }

        // ---- EXPORTAR/IMPORTAR TODO ----
        function exportConfig() {
            const data = {
                state: {
                    sessions: state.sessions,
                    totalMinutes: state.totalMinutes,
                    todaySessions: state.todaySessions,
                    streak: state.streak,
                    lastDate: state.lastDate,
                    focus: state.focus,
                    break: state.break,
                    longBreak: state.longBreak,
                    totalFocusTime: state.totalFocusTime,
                    totalBreakTime: state.totalBreakTime,
                    theme: state.theme,
                    lang: state.lang,
                },
                tasks: state.tasks,
                version: '7.0',
                exported: new Date().toISOString(),
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `zenforce_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Todo exportado', 2000);
        }

        function importConfig() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.state) {
                            Object.assign(state, data.state);
                            focusInput.value = state.focus || 25;
                            breakInput.value = state.break || 5;
                            longBreakInput.value = state.longBreak || 15;
                            if (state.theme) setTheme(state.theme);
                            if (state.lang) setLanguage(state.lang);
                        }
                        if (data.tasks) {
                            state.tasks = data.tasks;
                        }
                        if (!state.isRunning) {
                            state.current = state.focus * 60;
                            state.remaining = state.current;
                            state.phase = 'focus';
                        }
                        renderTasks();
                        updateUI();
                        saveState();
                        saveTasks();
                        showToast('✅ Todo importado', 2500);
                    } catch (err) {
                        showToast('❌ Archivo inválido', 2000);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetAll() {
            if (confirm('¿Resetear TODO?')) {
                localStorage.removeItem('zenforce_state');
                localStorage.removeItem('zenforce_tasks');
                localStorage.removeItem('zenforce_theme');
                localStorage.removeItem('zenforce_lang');
                location.reload();
            }
        }

        // ---- RELOJ ----
        function updateClock() {
            const now = new Date();
            currentTimeEl.textContent = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 10000);
        updateClock();

        // ---- EVENTOS ----
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        skipBtn.addEventListener('click', skipPhase);

        focusInput.addEventListener('change', () => { if (!state.isRunning) loadFromInputs(); });
        breakInput.addEventListener('change', () => { if (!state.isRunning) loadFromInputs(); });
        longBreakInput.addEventListener('change', () => { if (!state.isRunning) loadFromInputs(); });

        // Tema toggle (ciclo)
        themeToggle.addEventListener('click', () => {
            const themes = ['dark', 'light', 'neon', 'sunset', 'forest', 'galaxy'];
            const current = state.theme;
            const idx = themes.indexOf(current);
            const next = themes[(idx + 1) % themes.length];
            setTheme(next);
        });

        // Botones de tema
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => setTheme(btn.dataset.theme));
        });

        soundToggle.addEventListener('click', () => {
            state.soundEnabled = !state.soundEnabled;
            soundToggle.textContent = state.soundEnabled ? '🔔' : '🔕';
            showToast(state.soundEnabled ? '🔔 Sonido ON' : '🔕 Sonido OFF', 1500);
        });

        deepFocusToggle.addEventListener('click', toggleDeepFocus);

        langToggle.addEventListener('click', () => {
            const next = currentLang === 'es' ? 'en' : 'es';
            setLanguage(next);
        });

        // Kanban
        addTodoBtn.addEventListener('click', () => addTask('todo'));
        todoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTask('todo');
        });

        clearTasksBtn.addEventListener('click', clearDoneTasks);
        exportTasksBtn.addEventListener('click', exportTasks);
        importTasksBtn.addEventListener('click', importTasks);

        // ---- TECLADO ----
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                if (state.isRunning && !state.isPaused) pauseTimer();
                else if (state.isPaused) startTimer();
                else startTimer();
            }
            if (e.code === 'KeyR') resetTimer();
            if (e.code === 'KeyS') skipPhase();
        });

        // ---- INICIALIZACIÓN ----
        async function init() {
            // Cargar idioma
            const savedLang = localStorage.getItem('zenforce_lang') || 'es';
            setLanguage(savedLang);

            // Cargar tema
            const savedTheme = localStorage.getItem('zenforce_theme') || 'dark';
            setTheme(savedTheme);

            // Cargar estado
            loadState();
            loadTasks();

            loadFromInputs();
            renderTasks();
            updateUI();

            if ('Notification' in window && Notification.permission === 'default') {
                await Notification.requestPermission();
            }

            soundToggle.textContent = state.soundEnabled ? '🔔' : '🔕';
            deepFocusToggle.style.opacity = state.deepFocus ? '1' : '0.5';
            if (state.deepFocus) document.body.classList.add('deep-focus');

            showToast('🚀 ZenForce Pro · ¡Temas premium incluidos!', 3000, '🚀');

            setInterval(saveState, 5000);
            setInterval(saveTasks, 5000);

            console.log('%c🚀 ZENFORCE PRO v7.0', 'font-size:32px; font-weight:900;');
            console.log('%c👑 6 Temas Premium + Kanban + Multi-Idioma', 'font-size:16px; font-weight:700; color:#f97316;');
            console.log('🎨 Temas: Oscuro, Claro, Neon, Sunset, Forest, Galaxy');
            console.log('📋 Kanban con drag & drop');
            console.log('🌐 Cambia idioma con el botón 🌐');
            console.log('⌨️  Space: Play/Pausa · R: Reiniciar · S: Saltar');
        }

        init();
    </script>
</body>
</html>
